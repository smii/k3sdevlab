
# Modern Loki Chart Configuration (6.x)
# Simplified configuration using chart defaults with customizations

# Deployment mode - SingleBinary for simplicity in homelab
deploymentMode: SingleBinary

global:
  image:
    registry: docker.io

# Loki configuration - use chart's built-in config management
loki:
  auth_enabled: false
  
  # Use standard schema instead of test schema for better compatibility
  useTestSchema: false
  
  # Configure schema version for compatibility
  schemaConfig:
    configs:
      - from: 2020-10-24
        store: boltdb-shipper
        object_store: filesystem
        schema: v11
        index:
          prefix: index_
          period: 24h
  
  # Simple storage configuration
  storage:
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin
    type: filesystem
  
  # Disable ring and memberlist for SingleBinary mode
  config: |
    auth_enabled: false
    
    common:
      instance_addr: 127.0.0.1
      path_prefix: /var/loki
      storage:
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    
    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
      
    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
    
    limits_config:
      allow_structured_metadata: false
      max_line_size: 1MB
      max_line_size_truncate: true
      retention_period: 168h
      reject_old_samples: true
      reject_old_samples_max_age: 168h
    
    # Disable ingester ring completely
    ingester:
      lifecycler:
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        address: 127.0.0.1
        port: 9095
        
    # Disable distributor ring
    distributor:
      ring:
        kvstore:
          store: inmemory
  
  # Enable structured metadata - disabled for v11 schema compatibility
  structuredConfig:
    limits_config:
      allow_structured_metadata: false
      max_line_size: 1MB
      max_line_size_truncate: true
      retention_period: 168h  # 7 days
      reject_old_samples: true
      reject_old_samples_max_age: 168h

# SingleBinary configuration
singleBinary:
  replicas: 1
  
  # Persistence for logs
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""  # Use default storage class
  
  # Resource limits — actual usage ~319Mi, keep headroom for spikes
  resources:
    limits:
      cpu: 500m
      memory: 768Mi
    requests:
      cpu: 50m
      memory: 128Mi

# Ensure other components are disabled for SingleBinary mode
backend:
  replicas: 0
read:
  replicas: 0  
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

# Disable gateway for simplicity
gateway:
  enabled: false

# Disable canary — unnecessary health check probe for single-node homelab
lokiCanary:
  enabled: false

# Disable chunksCache and resultsCache — memcached is overkill for single-node
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Monitoring
monitoring:
  serviceMonitor:
    enabled: true
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false

# Promtail configuration - disabled since we're using Fluent Bit
promtail:
  enabled: false

# Disable test pods
test:
  enabled: false

# Use chart's default ruler settings  
ruler:
  enabled: false