languageCode = 'en-us'
title = ''
theme = ["github.com/lordmathis/hugo-theme-nightfall"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[pagination]
pagerSize = 3


