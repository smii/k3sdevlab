[module]
  [[module.mounts]]
    source = "/data_volume/scraped_data.json"
    target = "data/scraped_data.json"
  [[module.mounts]]
    source = "/data_volume/cache"
    target = "static/cache"
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "static"
    target = "static"
[[module.imports]]
  path = 'github.com/lordmathis/hugo-theme-nightfall'
