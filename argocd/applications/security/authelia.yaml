# Authelia - Authentication and Authorization
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authelia
  namespace: argocd
  labels:
    app.kubernetes.io/component: authentication
    app.kubernetes.io/part-of: security
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: security
  sources:
    - repoURL: https://charts.authelia.com
      chart: authelia
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/charts/authelia/authelia-values.yaml
    - repoURL: https://github.com/smii/k3sdevlab
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: authelia
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m