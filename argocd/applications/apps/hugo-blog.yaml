# Hugo Blog - Static Site
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hugo-blog
  namespace: argocd
  labels:
    app.kubernetes.io/component: static-site
    app.kubernetes.io/part-of: web-applications
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: applications
  source:
    repoURL: https://github.com/smii/k3sdevlab
    path: charts/hugo-blog/chart
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: hugo-blog
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m