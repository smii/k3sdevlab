---
apiVersion: v1
kind: ConfigMap
metadata:
  name: journald-fluent-bit
  namespace: logging
  labels:
    app.kubernetes.io/name: journald-collector
data:
  fluent-bit.conf: |
    [SERVICE]
        Daemon Off
        Flush 1
        Log_Level info
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
        Health_Check On

    [INPUT]
        Name systemd
        Tag host.systemd
        Path /var/log/journal
        DB /tmp/flb-journald.db
        Strip_Underscores On
        Read_From_Tail On
        Lowercase On

    [FILTER]
        Name record_modifier
        Match host.*
        Record hostname \${NODE_NAME}
        Record cluster homelab
        Record job systemd-journal

    [OUTPUT]
        Name loki
        Match host.*
        Host loki-stack.logging.svc.cluster.local
        Port 3100
        Labels job=systemd-journal,hostname=\${NODE_NAME}
        remove_keys severity,priority
        line_format json
        log_level info
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: journald-collector
  namespace: logging
  labels:
    app.kubernetes.io/name: journald-collector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: journald-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: journald-collector
    spec:
      serviceAccountName: fluent-bit
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:2.2.0
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: systemd
              mountPath: /run/systemd
              readOnly: true
          securityContext:
            privileged: true
      volumes:
        - name: config
          configMap:
            name: journald-fluent-bit
        - name: varlog
          hostPath:
            path: /var/log
        - name: systemd
          hostPath:
            path: /run/systemd
