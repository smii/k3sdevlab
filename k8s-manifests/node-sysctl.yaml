# Node sysctl tuning DaemonSet
# Sets kernel parameters required for inotify-heavy workloads (Falco, CrowdSec, etc.)
# Runs as a privileged init container on every node at pod startup — survives reboots.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-sysctl
  namespace: kube-system
  labels:
    app.kubernetes.io/name: node-sysctl
    app.kubernetes.io/component: node-tuning
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-sysctl
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-sysctl
    spec:
      tolerations:
        - operator: Exists
      hostPID: true
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo 524288 > /proc/sys/fs/inotify/max_user_watches
              echo 512     > /proc/sys/fs/inotify/max_user_instances
              echo "inotify: watches=$(cat /proc/sys/fs/inotify/max_user_watches) instances=$(cat /proc/sys/fs/inotify/max_user_instances)"
          securityContext:
            privileged: true
          volumeMounts:
            - name: proc
              mountPath: /proc
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 1m
              memory: 1Mi
      volumes:
        - name: proc
          hostPath:
            path: /proc
      terminationGracePeriodSeconds: 5
