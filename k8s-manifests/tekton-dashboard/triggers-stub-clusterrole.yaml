# Stub ClusterRole to satisfy tekton-dashboard-triggers-view ClusterRoleBinding.
# Tekton Triggers is not installed; without this stub the ClusterRoleBinding
# references a non-existent role, which causes K8s RBAC to deny all permissions
# for the tekton-dashboard service account (including listing pipelineruns).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tekton-triggers-aggregate-view
  labels:
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: tekton-dashboard
rules: []
