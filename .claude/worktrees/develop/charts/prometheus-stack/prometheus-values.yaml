grafana:
  enabled: true
  adminUser: admin
  adminPassword: jwnJbWwGoScn8RZlGcdE

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: "authelia-forwardauth@kubernetescrd"
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - grafana.rtm.kubernative.io
    path: /
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.rtm.kubernative.io

  # Grafana subchart rejects plaintext secrets in values since kube-prometheus-stack 68+
  # Use env var injection instead — secret created separately (not committed to git)
  assertNoLeakedSecrets: false
  envFromSecret: grafana-oidc-secret

  # OAuth2/OIDC Configuration for Authelia SSO
  grafana.ini:
    server:
      domain: grafana.rtm.kubernative.io
      root_url: https://grafana.rtm.kubernative.io

    security:
      allow_embedding: true
      cookie_samesite: lax

    auth:
      disable_login_form: false
      oauth_auto_login: false
      oauth_skip_org_role_update_sync: false

    auth.anonymous:
      enabled: true
      org_role: Editor
      hide_version: true

    auth.generic_oauth:
      enabled: true
      name: Authelia
      allow_assign_grafana_admin: true
      client_id: grafana
      client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid profile email groups
      auth_url: https://authelia.rtm.kubernative.io/api/oidc/authorization
      token_url: https://authelia.rtm.kubernative.io/api/oidc/token
      api_url: https://authelia.rtm.kubernative.io/api/oidc/userinfo
      login_attribute_path: preferred_username
      groups_attribute_path: groups
      role_attribute_path: >-
        contains(groups[*], 'admins') && 'GrafanaAdmin' ||
        contains(groups[*], 'devops_prd') && 'Editor' ||
        contains(groups[*], 'platform_prd') && 'Editor' ||
        contains(groups[*], 'devops_dev') && 'Editor' ||
        contains(groups[*], 'devops_test') && 'Editor' ||
        'Viewer'
      role_attribute_strict: false

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Loki datasource for log viewing in Grafana
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki-stack.logging.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000

prometheus:
  prometheusSpec:
    # Retention: 7 days instead of default 15 — homelab doesn't need long history
    retention: 7d
    # WAL compression reduces memory footprint significantly
    walCompression: true
    # Scrape interval — 60s is sufficient for homelab (default 30s doubles sample rate)
    scrapeInterval: 60s
    evaluationInterval: 60s

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    # Reduce TSDB compaction memory
    additionalArgs:
      - name: storage.tsdb.min-block-duration
        value: 2h
      - name: storage.tsdb.max-block-duration
        value: 2h
