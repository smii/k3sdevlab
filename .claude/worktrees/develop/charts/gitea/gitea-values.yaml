# Template file for gitea-values.yaml with environment variable substitution
# To use: envsubst < gitea-values.yaml.template > gitea-values.yaml

# Disable the PostgreSQL HA sub-chart, as we will use SQLite
postgresql-ha:
  enabled: false

# Configure Gitea itself
gitea:
  # Admin user configuration - will be created during first startup
  # These values come from environment variables
  admin:
    username: "smii"
    password: "CUBhMvnh63bfrlnP7Nci"
    email: "admin@ovie.kubernative.io"

  # This section directly configures Gitea's app.ini file
  config:
    server:
      # Using environment variable for hostname
      ROOT_URL: "https://git.rtm.kubernative.io"
      SSH_DOMAIN: "git.rtm.kubernative.io"
      LANDING_PAGE: "explore"
    database:
      DB_TYPE: "sqlite3"
    service:
      DISABLE_REGISTRATION: true
      REQUIRE_SIGNIN_VIEW: false
      DEFAULT_KEEP_EMAIL_PRIVATE: true
      DEFAULT_ALLOW_CREATE_ORGANIZATION: false
    security:
      INSTALL_LOCK: true
      SECRET_KEY: "${GITEA_SECRET_KEY}"  # From environment or auto-generated
    mailer:
      ENABLED: false
    log:
      LEVEL: "Info"
    repository:
      DEFAULT_BRANCH: "main"
      ENABLE_PUSH_CREATE_USER: false
      ENABLE_PUSH_CREATE_ORG: false

# Disable the SSH service as it's not being used
ssh:
  enabled: false

# Configure the Ingress to expose the web UI via Traefik
ingress:
  enabled: true
  ingressClassName: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: "authelia-forwardauth@kubernetescrd"
  hosts:
    - host: "git.rtm.kubernative.io"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: "gitea-tls"
      hosts:
        - "git.rtm.kubernative.io"

# Enable persistence to store Git data on a PersistentVolumeClaim
persistence:
  enabled: true
  size: 10Gi
  storageClass: "local-path"
  accessModes:
    - ReadWriteOnce

# Resource configuration for better performance and stability
resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# Security context for better container security (container-level)
securityContext:
  runAsUser: 1000
  runAsGroup: 1000

# Pod security context (pod-level — fsGroup goes here for volume ownership)
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Service configuration
service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    type: ClusterIP
    port: 22