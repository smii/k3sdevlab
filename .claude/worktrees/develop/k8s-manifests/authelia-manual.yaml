---
# authelia-manual.yaml
# Fallback / reference manifest for deploying Authelia without Helm.
# The canonical deployment is via ArgoCD + Helm (charts/authelia/authelia-values.yaml).
# Use this only for debugging or cluster-bootstrap without ArgoCD.
apiVersion: v1
kind: Namespace
metadata:
  name: authelia
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
  namespace: authelia
data:
  configuration.yaml: |
    theme: 'light'

    server:
      address: 'tcp://0.0.0.0:9091/'

    log:
      level: 'info'

    totp:
      disable: false
      issuer: 'kubernative.io'
      algorithm: 'SHA1'
      digits: 6
      period: 30

    webauthn:
      disable: true

    default_2fa_method: 'totp'

    authentication_backend:
      password_reset:
        disable: true
      file:
        path: '/config/users.yml'
        password:
          algorithm: 'argon2'
          argon2:
            variant: 'argon2id'
            iterations: 3
            memory: 65536
            parallelism: 4
            key_length: 32
            salt_length: 16

    access_control:
      default_policy: 'deny'
      rules:
        - domain: '*.rtm.kubernative.io'
          policy: 'one_factor'
          subject:
            - 'group:admins'
        - domain: '*.rtm.kubernative.io'
          policy: 'one_factor'
          subject:
            - 'group:viewers'
        - domain: 'argocd.rtm.kubernative.io'
          policy: 'one_factor'
          subject:
            - 'group:devops_dev'
            - 'group:devops_test'
        - domain: 'argocd.rtm.kubernative.io'
          policy: 'two_factor'
          subject:
            - 'group:devops_prd'
        - domain: 'grafana.rtm.kubernative.io'
          policy: 'one_factor'
          subject:
            - 'group:platform_dev'
            - 'group:platform_test'
            - 'group:homelab_dev'
            - 'group:homelab_test'
        - domain: 'grafana.rtm.kubernative.io'
          policy: 'two_factor'
          subject:
            - 'group:platform_prd'
            - 'group:homelab_prd'
        - domain: 'git.rtm.kubernative.io'
          policy: 'one_factor'
          subject:
            - 'group:devops_dev'
            - 'group:devops_test'
            - 'group:homelab_dev'
            - 'group:homelab_test'
            - 'group:webapp_dev'
            - 'group:webapp_test'
        - domain: 'git.rtm.kubernative.io'
          policy: 'two_factor'
          subject:
            - 'group:devops_prd'
            - 'group:homelab_prd'
            - 'group:webapp_prd'
        - domain: '*.rtm.kubernative.io'
          policy: 'one_factor'
          subject:
            - 'group:homelab_dev'
            - 'group:homelab_test'
        - domain: '*.rtm.kubernative.io'
          policy: 'two_factor'
          subject:
            - 'group:homelab_prd'

    session:
      name: 'authelia_session'
      same_site: 'lax'
      secret: '28c21e064b4a382198ba2287af71c24a1b831fbd4e7904433f5b1d806d52f85f'
      expiration: '1h'
      inactivity: '5m'
      cookies:
        - domain: 'rtm.kubernative.io'
          subdomain: 'authelia'
          default_redirection_url: 'https://authelia.rtm.kubernative.io'

    storage:
      local:
        path: '/config/db.sqlite3'
      encryption_key: '26533a4af73ed4468ac9aba20d020d7f27e59621c197e7dd41541b6304e98784'

    regulation:
      max_retries: 3
      find_time: '120s'
      ban_time: '300s'

