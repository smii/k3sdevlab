apiVersion: v1
kind: ConfigMap
metadata:
  name: tekton-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  tekton.json: |
    {
      "title": "Tekton Pipelines",
      "uid": "tekton-pipelines-001",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "label": "Datasource"
          },
          {
            "name": "pipeline",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "query": "label_values(tekton_pipelines_controller_pipelinerun_count, pipeline)",
            "current": {},
            "hide": 0,
            "label": "Pipeline",
            "includeAll": true,
            "allValue": ".*"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Pipeline Run Count",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sum(tekton_pipelines_controller_pipelinerun_count)",
              "legendFormat": "Total Runs",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [ { "color": "blue", "value": null } ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Pipeline Run Success Rate",
          "type": "gauge",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sum(tekton_pipelines_controller_pipelinerun_count{status=\"success\"}) / sum(tekton_pipelines_controller_pipelinerun_count{status=~\"success|failed\"}) * 100",
              "legendFormat": "Success %",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 80 },
                  { "color": "green", "value": 95 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "title": "Pipeline Run Status Breakdown",
          "type": "piechart",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sum by (status) (tekton_pipelines_controller_pipelinerun_count)",
              "legendFormat": "{{status}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": [
              { "matcher": { "id": "byName", "options": "success" }, "properties": [ { "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } } ] },
              { "matcher": { "id": "byName", "options": "failed" }, "properties": [ { "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } } ] },
              { "matcher": { "id": "byName", "options": "running" }, "properties": [ { "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } } ] }
            ]
          }
        },
        {
          "id": 4,
          "title": "Pipeline Run Rate (last 1h)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sum(increase(tekton_pipelines_controller_pipelinerun_count[1h])) by (pipeline, status)",
              "legendFormat": "{{pipeline}} — {{status}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 5,
          "title": "Task Run Duration — p50 / p95 / p99",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(tekton_pipelines_controller_taskrun_duration_seconds_bucket[5m])) by (le, task))",
              "legendFormat": "p50 {{task}}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(tekton_pipelines_controller_taskrun_duration_seconds_bucket[5m])) by (le, task))",
              "legendFormat": "p95 {{task}}",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(tekton_pipelines_controller_taskrun_duration_seconds_bucket[5m])) by (le, task))",
              "legendFormat": "p99 {{task}}",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 6,
          "title": "Currently Running Pipelines",
          "type": "stat",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sum(tekton_pipelines_controller_running_pipelineruns_count)",
              "legendFormat": "Running",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              }
            }
          }
        }
      ]
    }
