# Tekton Dashboard — vendored release YAML + Traefik ingress with Authelia SSO
# Dashboard release vendored at k8s-manifests/tekton-dashboard/release.yaml
# (no Helm chart available from CDF for the dashboard — raw YAML approach)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-dashboard
  namespace: argocd
  labels:
    app.kubernetes.io/component: ci-cd
    app.kubernetes.io/part-of: core-infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: core-infrastructure
  source:
    repoURL: https://github.com/smii/k3sdevlab
    targetRevision: HEAD
    path: k8s-manifests/tekton-dashboard
  destination:
    server: https://kubernetes.default.svc
    namespace: tekton-pipelines
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: extensions.dashboard.tekton.dev
      jqPathExpressions:
        - .status
        - .spec.conversion
        - .spec.preserveUnknownFields
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
