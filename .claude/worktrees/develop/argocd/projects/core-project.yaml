# Core Infrastructure Project
# Contains essential cluster components
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: core-infrastructure
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Core infrastructure components (ingress, secrets, etc.)
  sourceRepos:
  - 'https://github.com/smii/k3sdevlab'
  - 'https://helm.traefik.io/traefik'
  - 'https://bitnami-labs.github.io/sealed-secrets'
  - 'https://cdfoundation.github.io/tekton-helm-chart/'
  destinations:
  - namespace: 'traefik-system'
    server: https://kubernetes.default.svc
  - namespace: 'traefik'
    server: https://kubernetes.default.svc
  - namespace: 'kube-system'
    server: https://kubernetes.default.svc
  - namespace: 'tekton-pipelines'
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  roles:
  - name: admin
    description: Admin role for core infrastructure
    policies:
    - p, proj:core-infrastructure:admin, applications, *, core-infrastructure/*, allow
    - p, proj:core-infrastructure:admin, repositories, *, *, allow
    groups:
    - homelab:admin